<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cymor Movie Hub | Elite Streaming</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="nav" id="main-nav">
        <div class="nav-left">
            <h1 class="logo">CYMOR<span> MOVIE HUB</span></h1>
            <ul class="nav-links">
                <li class="active">Home</li>
                <li>Movies</li>
                <li>New</li>
                <li>My List</li>
            </ul>
        </div>
        <div class="nav-right">
            <i class="fas fa-search"></i>
            <i class="fas fa-bell"></i>
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" class="avatar">
        </div>
    </nav>

    <header class="hero" id="hero">
        <div class="hero-content">
            <h1 id="hero-title">Loading...</h1>
            <p id="hero-overview">Fetching the latest cinematic masterpieces for you.</p>
            <div class="hero-btns">
                <button class="btn-play" id="hero-play"><i class="fas fa-play"></i> Play</button>
                <button class="btn-info"><i class="fas fa-circle-info"></i> More Info</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="row">
            <h2>Trending Now</h2>
            <div class="slider" id="trending-row"></div>
        </div>
        <div class="row">
            <h2>Action Thrillers</h2>
            <div class="slider" id="action-row"></div>
        </div>
    </main>

    <div id="player-modal" class="modal hidden">
        <div class="modal-content">
            <button id="close-modal">&times;</button>
            <iframe id="video-frame" src="" allowfullscreen></iframe>
            <div class="modal-tools">
                <button id="dl-btn" class="btn-info"><i class="fas fa-download"></i> Download</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
