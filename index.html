<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CymorAllVideo Downloader</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');

        body {
            background: radial-gradient(circle at center, #2a0000 0%, #000000 100%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glass {
            background: rgba(20,0,0,0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,0,0,0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .glow {
            text-shadow: 0 0 10px red, 0 0 20px darkred;
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }

        button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover:not(:disabled) {
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pulse-red {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>

<body class="flex flex-col items-center p-6">

    <header class="text-center mt-6">
        <p class="brand text-red-500 font-bold tracking-widest text-sm">
            CYMOR TECH SERVICES PRESENT
        </p>

        <h1 class="text-4xl md:text-6xl font-bold glow mt-2 brand uppercase italic">
            CymorAllVideoDownloader
        </h1>

        <p class="text-gray-400 mt-3 text-sm tracking-wide">
            YouTube • TikTok • Facebook — No Watermark • High Speed .Completely free.
        </p>
    </header>

    <div class="glass p-8 rounded-3xl w-full max-w-2xl mt-10">
        <input id="urlInput"
            class="w-full p-4 bg-black/60 border border-red-900 rounded-xl text-white outline-none focus:border-red-500 transition-all"
            placeholder="Paste video link here...">

        <button onclick="analyzeLink()"
            class="w-full mt-4 bg-red-700 hover:bg-red-600 p-4 rounded-xl font-bold uppercase tracking-widest shadow-lg shadow-red-900/20">
            Analyze Link
        </button>
    </div>

    <div id="preview" class="hidden glass p-8 rounded-3xl w-full max-w-2xl mt-6 border-t-2 border-red-600/30">
        <div class="flex justify-between items-center border-b border-red-900/30 pb-4">
            <div>
                <p class="text-xs text-gray-500 uppercase font-bold tracking-tighter">Detected Platform</p>
                <h2 id="platform" class="text-2xl font-bold text-red-500 brand"></h2>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-500 uppercase font-bold tracking-tighter">Status</p>
                <p id="status" class="text-green-400 font-semibold"></p>
            </div>
        </div>

        <div class="mt-6 flex flex-col gap-3">
            <button id="mp4Btn" onclick="download('mp4')" class="w-full bg-red-700 p-4 rounded-xl font-bold uppercase flex items-center justify-center gap-2">
                <span>Download MP4</span>
            </button>

            <button id="mp3Btn" onclick="download('mp3')" class="w-full border border-red-700 hover:bg-red-700/10 p-4 rounded-xl font-bold uppercase">
                Download MP3 (Audio)
            </button>
        </div>
    </div>

    <div class="mt-12 w-full max-w-2xl">
        <div class="flex items-center gap-2 mb-4">
            <div class="h-[1px] flex-1 bg-red-900/50"></div>
            <h2 class="text-red-500 font-bold brand text-sm uppercase">Recent Logs</h2>
            <div class="h-[1px] flex-1 bg-red-900/50"></div>
        </div>
        <div id="history" class="grid gap-2"></div>
    </div>

    <footer class="mt-auto pt-10 pb-6 text-center text-gray-500 text-sm">
        <p class="tracking-widest uppercase">
            Built by the <span class="text-red-500 font-bold glow">Legendary Smiley Cymor</span>
        </p>
        <div class="flex items-center justify-center gap-4 mt-3">
            <a href="https://wa.me/254113821327" class="text-white bg-green-600/20 px-3 py-1 rounded-full border border-green-600/30 flex items-center gap-2 hover:bg-green-600/40 transition">
                <span class="text-green-500 font-bold">WhatsApp:</span> 0113821327
            </a>
        </div>
    </footer>

    <script>
        let currentUrl = "";
        // Direct Cobalt API link to avoid backend stress
        const API_URL = "https://api.cobalt.tools/api/json";

        function detect(url) {
            const lowUrl = url.toLowerCase();
            if (lowUrl.includes("youtube.com") || lowUrl.includes("youtu.be")) return "YouTube";
            if (lowUrl.includes("tiktok.com")) return "TikTok";
            if (lowUrl.includes("facebook.com") || lowUrl.includes("fb.watch")) return "Facebook";
            return "Multi-Platform";
        }

        function analyzeLink() {
            const urlInput = document.getElementById("urlInput");
            const url = urlInput.value.trim();
            
            if (!url) {
                alert("Please paste a valid video link.");
                return;
            }

            currentUrl = url;
            document.getElementById("preview").classList.remove("hidden");
            document.getElementById("platform").innerText = detect(url);
            document.getElementById("status").innerText = "READY";
            document.getElementById("status").className = "text-green-400 font-semibold";
        }

        async function download(type) {
            const statusText = document.getElementById("status");
            const mp4Btn = document.getElementById("mp4Btn");
            const mp3Btn = document.getElementById("mp3Btn");

            statusText.innerText = "PROCESSING...";
            statusText.className = "text-yellow-500 font-semibold pulse-red";
            mp4Btn.disabled = true;
            mp3Btn.disabled = true;

            try {
                // Direct request to Cobalt API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 
                        'Accept': 'application/json',
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ 
                        url: currentUrl, 
                        vQuality: "1080",
                        isAudioOnly: type === 'mp3',
                        isNoTTWatermark: true,
                        filenamePattern: "pretty"
                    })
                });

                const data = await response.json();

                if (data.url) {
                    statusText.innerText = "STARTING DOWNLOAD";
                    statusText.className = "text-green-400 font-semibold";
                    
                    window.open(data.url, "_blank");
                    saveHistory(currentUrl, detect(currentUrl));
                } else {
                    throw new Error(data.text || "Cobalt rejected the link");
                }
            } catch (err) {
                statusText.innerText = "FAILED";
                statusText.className = "text-red-500 font-semibold";
                alert("Cymor Engine Error: " + err.message);
            } finally {
                mp4Btn.disabled = false;
                mp3Btn.disabled = false;
            }
        }

        function saveHistory(url, platform) {
            let history = JSON.parse(localStorage.getItem("cymor_history") || "[]");
            const entry = { url, platform, date: new Date().toLocaleTimeString() };
            
            history = history.filter(item => item.url !== url);
            history.unshift(entry);
            history = history.slice(0, 4);

            localStorage.setItem("cymor_history", JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem("cymor_history") || "[]");
            const container = document.getElementById("history");
            
            if (history.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-600 italic text-xs">No recent activity detected.</p>`;
                return;
            }

            container.innerHTML = history.map(h => `
                <div class="bg-black/40 p-3 rounded-lg border border-red-900/20 flex justify-between items-center">
                    <span class="text-red-500 font-bold text-xs brand">${h.platform}</span>
                    <span class="text-[10px] text-gray-500 truncate max-w-[150px] mx-2">${h.url}</span>
                    <span class="text-[10px] text-gray-600">${h.date}</span>
                </div>
            `).join("");
        }

        renderHistory();
    </script>

</body>
</html>
