<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cymor Bible — Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.05); }
    .nav-active { color: #60a5fa; }
    
    /* Smooth Transition Utilities */
    .fade-out { opacity: 0; transform: translateY(10px); }
  </style>
</head>

<body class="bg-[#0F172A] text-slate-100 min-h-screen pb-24">

  <header class="p-6 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-xl shadow-lg shadow-blue-900/20">C</div>
      <h1 class="font-bold text-lg tracking-tight">Cymor Bible</h1>
    </div>
    <a href="settings.html" class="px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-xl text-xs font-medium hover:bg-slate-700 transition-colors">
      Settings
    </a>
  </header>

  <section class="px-6 mb-8">
    <h2 class="text-3xl font-bold mb-1" id="greetingText">Welcome</h2>
    <p class="text-slate-400 text-sm" id="currentDateStr"></p>
    
    <button id="pwaInstallBtn" class="hidden mt-4 w-full flex items-center justify-center gap-2 bg-blue-600 text-white p-4 rounded-2xl text-xs font-bold shadow-lg shadow-blue-500/20 active:scale-95 transition-all">
      📥 INSTALL CYMOR BIBLE APP VERSION 1.0
    </button>
  </section>

  <main class="px-4 space-y-6">
    <div id="verseCardAnchor" class="transition-all duration-500 transform"></div>
    <div id="prayerCardAnchor" class="transition-all duration-500 transform"></div>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-800 px-8 py-4 flex justify-between items-center z-[100]">
    <a href="index.html" class="flex flex-col items-center gap-1 nav-active">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
        <span class="text-[10px]">Home</span>
    </a>
    <a href="bible.html" class="flex flex-col items-center gap-1 text-slate-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg>
        <span class="text-[10px]">Bible</span>
    </a>
    <a href="prayer.html" class="flex flex-col items-center gap-1 text-slate-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"/></svg>
        <span class="text-[10px]">Prayers</span>
    </a>
    <a href="favorites.html" class="flex flex-col items-center gap-1 text-slate-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"/></svg>
        <span class="text-[10px]">Saved</span>
    </a>
  </nav>

  <script type="module" src="./app.js"></script>

</body>
</html>
