<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cymor Movie Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-nav">
        <div class="logo">Cymor<span>MovieHub</span></div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Search movies...">
        </div>
    </nav>

    <section id="hero" class="hero-carousel">
        </section>

    <div class="category-container">
        <button class="chip active">All</button>
        <button class="chip">Hollywood</button>
        <button class="chip">Nollywood</button>
        <button class="chip">Action</button>
        <button class="chip">Series</button>
    </div>

    <main class="content-wrapper">
        <section class="movie-section">
            <div class="section-header">
                <h3>Popular Series</h3>
                <a href="#">All <i class="fas fa-chevron-right"></i></a>
            </div>
            <div id="popular-series" class="horizontal-grid wide-cards"></div>
        </section>

        <section class="movie-section">
            <div class="section-header">
                <h3>Popular Movies</h3>
                <a href="#">All <i class="fas fa-chevron-right"></i></a>
            </div>
            <div id="popular-movies" class="horizontal-grid tall-cards"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-house"></i><span>Home</span></div>
        <div class="nav-item"><i class="fas fa-play-circle"></i><span>ShortTV</span></div>
        <div class="nav-item center-btn"><div class="free-badge">FREE</div></div>
        <div class="nav-item"><i class="fas fa-download"></i><span>Downloads</span></div>
        <div class="nav-item"><i class="fas fa-user"></i><span>Me</span></div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
