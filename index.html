<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CymorAllVideo Downloader</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');

body {
    background: radial-gradient(circle at center, #2a0000 0%, #000000 100%);
    color: white;
    font-family: 'Rajdhani', sans-serif;
    margin: 0;
    overflow-x: hidden;
    min-height: 100vh;
}

.glass {
    background: rgba(20,0,0,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,0,0,0.2);
}

.card-glass {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
}

.hidden-section { display: none; }

.glow {
    text-shadow: 0 0 10px red, 0 0 20px darkred;
}

.brand {
    font-family: 'Orbitron', sans-serif;
}
</style>
</head>

<body class="flex flex-col items-center p-6">

<!-- PAGE 1 -->
<div id="landingPage" class="w-full max-w-5xl flex flex-col items-center py-12">

<header class="text-center mb-10">
    <h1 class="text-5xl md:text-7xl font-bold glow brand">Download Anything</h1>
    <p class="text-gray-400 mt-3">YouTube • TikTok • Facebook</p>
</header>

<div class="grid md:grid-cols-3 gap-4 w-full">
    <div class="card-glass p-6 rounded-xl text-center">YouTube</div>
    <div class="card-glass p-6 rounded-xl text-center">Facebook</div>
    <div class="card-glass p-6 rounded-xl text-center">TikTok</div>
</div>

<button onclick="showDownloader()"
class="mt-10 bg-red-700 px-8 py-4 rounded-full font-bold">
Start Downloading
</button>

</div>

<!-- PAGE 2 -->
<div id="downloaderPage" class="hidden-section w-full max-w-2xl">

<h2 class="text-center text-3xl glow brand mb-6">Cymor Downloader</h2>

<div class="glass p-6 rounded-xl">

<input id="urlInput"
class="w-full p-3 bg-black border border-red-800 rounded-lg"
placeholder="Paste video link here">

<div class="flex gap-2 mt-4">
<button onclick="pasteLink()" class="flex-1 bg-gray-800 p-3 rounded-lg">
Paste
</button>
<button onclick="analyzeLink()" class="flex-1 bg-red-700 p-3 rounded-lg">
Analyze
</button>
</div>

</div>

<!-- PREVIEW -->
<div id="preview" class="hidden glass p-6 rounded-xl mt-5">

<p class="text-red-400">Platform: <span id="platform"></span></p>
<p id="status" class="mt-2 text-green-400">READY</p>

<div class="mt-4 flex gap-2">
<button onclick="downloadVideo('video')" class="flex-1 bg-red-700 p-3 rounded-lg">
Download MP4
</button>

<button onclick="downloadVideo('audio')" class="flex-1 border border-red-700 p-3 rounded-lg">
MP3
</button>
</div>

</div>

<button onclick="showLanding()" class="mt-6 text-gray-400">
← Back
</button>

</div>

<script>
let currentUrl = "";

// PAGE SWITCH (ALWAYS STABLE)
function showDownloader(){
document.getElementById("landingPage").classList.add("hidden-section");
document.getElementById("downloaderPage").classList.remove("hidden-section");
}

function showLanding(){
document.getElementById("downloaderPage").classList.add("hidden-section");
document.getElementById("landingPage").classList.remove("hidden-section");
}

// CLIPBOARD
async function pasteLink(){
try {
document.getElementById("urlInput").value = await navigator.clipboard.readText();
} catch {
alert("Paste manually");
}
}

// CLEAN URL
function extractUrl(text){
const match = text.match(/https?:\/\/[^\s]+/);
return match ? match[0] : text;
}

// PLATFORM DETECT
function detect(url){
if(url.includes("youtube")) return "YouTube";
if(url.includes("tiktok")) return "TikTok";
if(url.includes("facebook")) return "Facebook";
return "Unknown";
}

// ANALYZE
function analyzeLink(){
let url = extractUrl(document.getElementById("urlInput").value);

if(!url.startsWith("http")){
alert("Invalid link");
return;
}

currentUrl = url;

document.getElementById("preview").classList.remove("hidden");
document.getElementById("platform").innerText = detect(url);
document.getElementById("status").innerText = "READY";
}

// 🔥 FIXED DOWNLOAD ENGINE (REAL DOWNLOAD HANDLING)
async function downloadVideo(type){
const status = document.getElementById("status");
status.innerText = "Processing...";

try {
const res = await fetch("https://api.cobalt.tools/api/json", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
url: currentUrl,
isAudioOnly: type === "audio",
filenamePattern:"pretty"
})
});

const data = await res.json();

if(!data.url) throw new Error("No download link returned");

// 👉 BEST METHOD: force browser download
const a = document.createElement("a");
a.href = data.url;
a.target = "_blank";
a.download = "cymor-download";
document.body.appendChild(a);
a.click();
a.remove();

status.innerText = "Downloaded";

} catch(err){
status.innerText = "Failed";
alert("Download error: " + err.message);
}
}

</script>

</body>
</html>
