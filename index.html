<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cymor Bible App — Daily Spiritual Companion</title>
  
  <!-- PWA & Mobile Capabilities Meta Tags -->
  <meta name="theme-color" content="#0F172A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./assets/icons/icon-192x192.png">

  <!-- Core Visual Assets & Styling Frameworks -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#0F172A] text-slate-100 font-sans antialiased min-h-screen flex flex-col selection:bg-blue-500/30 selection:text-blue-200">

  <!-- Dynamic Ambient Glow Backgrounds -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
    <div class="absolute -top-[40%] -left-[20%] w-[80%] h-[60%] bg-blue-600/10 rounded-full blur-[120px]"></div>
    <div class="absolute top-[30%] -right-[30%] w-[70%] h-[50%] bg-amber-500/5 rounded-full blur-[100px]"></div>
  </div>

  <!-- Main Navigation & Application Header -->
  <header class="sticky top-0 z-50 bg-[#0F172A]/70 backdrop-blur-md border-b border-slate-800/60 transition-all">
    <div class="max-w-md mx-auto px-4 h-16 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
          <span class="text-sm font-bold tracking-tighter text-white">C</span>
        </div>
        <span class="text-lg font-semibold tracking-wide bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-slate-400">Cymor Bible</span>
      </div>
      
      <div class="flex items-center gap-2">
        <!-- PWA Smart Install Button (Triggers on compatible clients) -->
        <button id="pwaInstallBtn" class="hidden text-xs bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-medium px-3 py-1.5 rounded-full transition-all duration-200 shadow-md shadow-blue-600/10 active:scale-95">
          Install App
        </button>
        
        <!-- Quick System Settings Shortcut -->
        <a href="./pages/settings.html" class="p-2 text-slate-400 hover:text-slate-200 rounded-xl hover:bg-slate-800/40 transition" aria-label="Settings">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </a>
      </div>
    </div>
  </header>

  <!-- Interactive Application Core Workspace -->
  <main class="w-full max-w-md mx-auto px-4 flex-1 py-6 space-y-6 z-10 overflow-y-auto pb-24">
    
    <!-- Hero Greeting Segment -->
    <section class="mb-2">
      <h2 id="greetingText" class="text-2xl font-bold tracking-tight text-slate-100">Welcome back</h2>
      <p id="currentDateStr" class="text-xs text-slate-400 font-medium tracking-wide mt-0.5">Tuesday, May 19</p>
    </section>

    <!-- Component Anchor: Verse Card Area -->
    <section id="verseCardAnchor" class="transition-all duration-300">
      <div class="animate-pulse bg-slate-800/40 backdrop-blur-md border border-slate-700/30 rounded-3xl h-64 w-full"></div>
    </section>

    <!-- Component Anchor: Prayer Card Area -->
    <section id="prayerCardAnchor" class="transition-all duration-300">
      <div class="animate-pulse bg-slate-800/40 backdrop-blur-md border border-slate-700/30 rounded-3xl h-48 w-full"></div>
    </section>

    <!-- Quick Navigation Matrix Panel -->
    <section class="grid grid-cols-2 gap-3">
      <a href="./pages/bible.html" class="bg-slate-800/30 backdrop-blur-md border border-slate-800/80 p-4 rounded-2xl flex flex-col justify-between group hover:border-slate-700/60 hover:bg-slate-800/40 transition duration-200">
        <div class="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-400 group-hover:scale-105 transition-transform duration-200">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
          </svg>
        </div>
        <div class="mt-6">
          <h3 class="font-semibold text-sm text-slate-200">Read Bible</h3>
          <p class="text-xs text-slate-400 mt-0.5">Explore scriptures</p>
        </div>
      </a>

      <a href="./pages/favorites.html" class="bg-slate-800/30 backdrop-blur-md border border-slate-800/80 p-4 rounded-2xl flex flex-col justify-between group hover:border-slate-700/60 hover:bg-slate-800/40 transition duration-200">
        <div class="w-10 h-10 rounded-xl bg-amber-500/10 flex items-center justify-center text-amber-400 group-hover:scale-105 transition-transform duration-200">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
        </div>
        <div class="mt-6">
          <h3 class="font-semibold text-sm text-slate-200">Bookmarks</h3>
          <p class="text-xs text-slate-400 mt-0.5">Saved verses & notes</p>
        </div>
      </a>
    </section>

  </main>

  <!-- Navigation Blueprint: Bottom Micro-Tab Navigation Bar -->
  <nav class="fixed bottom-0 left-0 right-0 z-50 bg-[#0F172A]/80 backdrop-blur-lg border-t border-slate-800/80">
    <div class="max-w-md mx-auto h-16 grid grid-cols-4 px-2">
      <a href="./index.html" class="flex flex-col items-center justify-center gap-1 text-blue-400 transition group">
        <svg class="w-5 h-5 transition-transform group-active:scale-95" fill="currentColor" viewBox="0 0 20 20">
          <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
        </svg>
        <span class="text-[10px] font-semibold tracking-wide">Home</span>
      </a>

      <a href="./pages/bible.html" class="flex flex-col items-center justify-center gap-1 text-slate-400 hover:text-slate-200 transition group">
        <svg class="w-5 h-5 transition-transform group-active:scale-95" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <span class="text-[10px] font-medium tracking-wide">Bible</span>
      </a>

      <a href="./pages/prayer.html" class="flex flex-col items-center justify-center gap-1 text-slate-400 hover:text-slate-200 transition group">
        <svg class="w-5 h-5 transition-transform group-active:scale-95" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
        </svg>
        <span class="text-[10px] font-medium tracking-wide">Prayers</span>
      </a>

      <a href="./pages/favorites.html" class="flex flex-col items-center justify-center gap-1 text-slate-400 hover:text-slate-200 transition group">
        <svg class="w-5 h-5 transition-transform group-active:scale-95" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
        </svg>
        <span class="text-[10px] font-medium tracking-wide">Saved</span>
      </a>
    </div>
  </nav>

  <!-- Core Javascript Initialization System Hook -->
  <!-- Note: JavaScript components use type="module" to enable proper ES import/export architecture -->
  <script type="module" src="./app.js"></script>
</body>
</html>
