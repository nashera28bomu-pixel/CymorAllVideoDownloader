<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Cymor Movie Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav class="top-nav">
    <div class="logo">
      <span class="logo-cymor">Cymor</span><span class="logo-hub">MovieHub</span>
    </div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="search-input" placeholder="Search movies or series..."/>
    </div>
  </nav>

  <main id="home-content">
    <section id="hero" class="hero-carousel"></section>

    <section class="movie-section">
      <div class="section-header"><h3>🔥 Trending Series</h3></div>
      <div id="popular-series" class="horizontal-grid wide-cards"></div>
    </section>

    <section class="movie-section">
      <div class="section-header"><h3 id="movies-title">🎬 Popular Movies</h3></div>
      <div id="popular-movies" class="horizontal-grid tall-cards"></div>
    </section>
  </main>

  <div id="movie-modal" class="modal-view hidden">
    <button class="back-btn"><i class="fas fa-chevron-left"></i> Back</button>
    <div id="modal-body"></div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" data-nav="home"><i class="fas fa-house"></i><span>Home</span></div>
    <div class="nav-item" data-nav="series"><i class="fas fa-tv"></i><span>Series</span></div>
    <div class="nav-item center-btn"><i class="fas fa-play"></i></div>
    <div class="nav-item" data-nav="downloads"><i class="fas fa-download"></i><span>Downloads</span></div>
    <div class="nav-item" data-nav="profile"><i class="fas fa-user"></i><span>Profile</span></div>
  </nav>

  <script src="script.js"></script>
</body>
</html>
