<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CymorAllVideo Downloader</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');

body {
    background: radial-gradient(circle at center, #2a0000 0%, #000000 100%);
    color: white;
    font-family: 'Rajdhani', sans-serif;
    margin: 0;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
}

.glass {
    background: rgba(20,0,0,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,0,0,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.8);
}

.glow {
    text-shadow: 0 0 10px red, 0 0 20px darkred;
}

.brand {
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 2px;
}

button {
    transition: all 0.3s ease;
}
button:hover:not(:disabled) {
    transform: scale(1.02);
    filter: brightness(1.2);
}
</style>
</head>

<body class="flex flex-col items-center p-4">

<!-- HEADER -->
<header class="text-center mt-6">
    <p class="brand text-red-500 font-bold text-sm tracking-widest">
        CYMOR TECH SERVICES PRESENT
    </p>

    <h1 class="text-4xl md:text-6xl font-bold glow mt-2 brand uppercase italic">
        CymorAllVideo Downloader
    </h1>

    <p class="text-gray-400 mt-3 text-sm">
        YouTube • TikTok • Facebook — No Watermark • High Speed
    </p>
</header>

<!-- INPUT -->
<div class="glass p-6 rounded-2xl w-full max-w-2xl mt-8">
    <input id="urlInput"
        class="w-full p-4 bg-black/60 border border-red-900 rounded-xl text-white outline-none"
        placeholder="Paste video link here...">

    <button onclick="analyzeLink()"
        class="w-full mt-4 bg-red-700 hover:bg-red-600 p-4 rounded-xl font-bold uppercase">
        Analyze Link
    </button>
</div>

<!-- PREVIEW -->
<div id="preview" class="hidden glass p-6 rounded-2xl w-full max-w-2xl mt-6">

    <div class="flex justify-between items-center border-b border-red-900/30 pb-3">
        <div>
            <p class="text-xs text-gray-400 uppercase">Platform</p>
            <h2 id="platform" class="text-xl font-bold text-red-500 brand"></h2>
        </div>

        <div class="text-right">
            <p class="text-xs text-gray-400 uppercase">Status</p>
            <p id="status" class="text-green-400 font-semibold">READY</p>
        </div>
    </div>

    <div class="mt-4 flex flex-col gap-3">
        <button id="mp4Btn" onclick="download('mp4')" class="bg-red-700 p-4 rounded-xl font-bold">
            Download MP4
        </button>

        <button id="mp3Btn" onclick="download('mp3')" class="border border-red-700 p-4 rounded-xl font-bold">
            Download MP3
        </button>
    </div>
</div>

<!-- HISTORY -->
<div class="mt-10 w-full max-w-2xl">
    <h2 class="text-red-500 font-bold brand text-sm mb-3">Recent Logs</h2>
    <div id="history" class="space-y-2"></div>
</div>

<!-- FOOTER -->
<footer class="mt-auto text-center text-gray-500 text-sm py-6">
    <p>
        Built by <span class="text-red-500 font-bold glow">Legendary Smiley Cymor</span>
    </p>
    <p class="text-xs mt-2">
        WhatsApp: 0113821327
    </p>
</footer>

<script>
let currentUrl = "";

/* 🔥 UPDATED YOUR RAILWAY API URL */
const API_URL = "https://cymorallvideodownloader-production.up.railway.app/download";

function detect(url){
    url = url.toLowerCase();
    if(url.includes("youtube")) return "YouTube";
    if(url.includes("tiktok")) return "TikTok";
    if(url.includes("facebook")) return "Facebook";
    return "Unknown";
}

function analyzeLink(){
    const url = document.getElementById("urlInput").value.trim();
    if(!url) return alert("Paste a link first");

    currentUrl = url;
    document.getElementById("preview").classList.remove("hidden");
    document.getElementById("platform").innerText = detect(url);
    document.getElementById("status").innerText = "READY";
}

async function download(type){
    const status = document.getElementById("status");

    const mp4Btn = document.getElementById("mp4Btn");
    const mp3Btn = document.getElementById("mp3Btn");

    status.innerText = "PROCESSING...";
    status.className = "text-yellow-400 font-semibold";

    mp4Btn.disabled = true;
    mp3Btn.disabled = true;

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                url: currentUrl,
                type: type
            })
        });

        const data = await res.json();

        if(data.success){
            window.open(data.download, "_blank");
            status.innerText = "DOWNLOAD STARTED";
            status.className = "text-green-400 font-semibold";
            saveHistory(currentUrl, detect(currentUrl));
        } else {
            throw new Error(data.message);
        }

    } catch(err){
        status.innerText = "FAILED";
        status.className = "text-red-500 font-semibold";
        alert("Error: " + err.message);
    }

    mp4Btn.disabled = false;
    mp3Btn.disabled = false;
}

/* HISTORY */
function saveHistory(url, platform){
    let history = JSON.parse(localStorage.getItem("cymor_history") || "[]");

    history.unshift({url, platform, time: new Date().toLocaleTimeString()});
    history = history.slice(0,4);

    localStorage.setItem("cymor_history", JSON.stringify(history));
    renderHistory();
}

function renderHistory(){
    let history = JSON.parse(localStorage.getItem("cymor_history") || "[]");

    const box = document.getElementById("history");

    if(history.length === 0){
        box.innerHTML = `<p class="text-gray-600 text-xs text-center">No activity yet</p>`;
        return;
    }

    box.innerHTML = history.map(h => `
        <div class="glass p-3 rounded flex justify-between text-xs">
            <span class="text-red-500 font-bold">${h.platform}</span>
            <span class="truncate max-w-[140px]">${h.url}</span>
            <span class="text-gray-500">${h.time}</span>
        </div>
    `).join("");
}

renderHistory();
</script>

</body>
</html>
