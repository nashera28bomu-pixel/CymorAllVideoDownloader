<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CymorAllVideo Downloader</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');

body {
    background: radial-gradient(circle at center, #2a0000 0%, #000000 100%);
    color: white;
    font-family: 'Rajdhani', sans-serif;
    margin: 0;
    overflow-x: hidden;
}

.glass {
    background: rgba(20,0,0,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,0,0,0.2);
}

.glow {
    text-shadow: 0 0 10px red, 0 0 20px darkred;
}

.brand {
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 2px;
}

button {
    transition: 0.2s ease;
}
button:hover {
    transform: scale(1.03);
}
</style>
</head>

<body class="min-h-screen flex flex-col items-center p-6">

<!-- 🔥 TOP BRANDING -->
<header class="text-center mt-6">
    <p class="brand text-red-500 font-bold tracking-widest text-sm">
        CYMOR TECH SERVICES PRESENT
    </p>

    <h1 class="text-4xl md:text-6xl font-bold glow mt-2 brand">
        CymorAllVideo Downloader
    </h1>

    <p class="text-gray-400 mt-3 text-sm">
        Download videos from YouTube • TikTok • Facebook in seconds
    </p>
</header>

<!-- UNIVERSAL INPUT -->
<div class="glass p-6 rounded-2xl w-full max-w-2xl mt-10">
    <input id="urlInput"
        class="w-full p-3 bg-black/50 border border-red-700 rounded text-white outline-none"
        placeholder="Paste ANY video link here...">

    <button onclick="analyzeLink()"
        class="w-full mt-4 bg-red-700 p-3 rounded font-bold">
        Analyze Link
    </button>
</div>

<!-- PREVIEW -->
<div id="preview" class="hidden glass p-6 rounded-2xl w-full max-w-2xl mt-6">

    <p class="text-sm text-gray-400">Detected Platform:</p>
    <h2 id="platform" class="text-xl font-bold text-red-500"></h2>

    <p class="mt-3 text-sm text-gray-400">Status:</p>
    <p id="status" class="text-green-400"></p>

    <button onclick="download('mp4')" class="mt-4 w-full bg-red-700 p-2 rounded font-bold">
        Download MP4
    </button>

    <button onclick="download('mp3')" class="mt-2 w-full border border-red-700 p-2 rounded">
        Download MP3
    </button>
</div>

<!-- HISTORY -->
<div class="mt-10 w-full max-w-2xl">
    <h2 class="text-red-500 font-bold">Recent Downloads</h2>
    <div id="history" class="text-sm text-gray-400 mt-2"></div>
</div>

<!-- FOOTER -->
<footer class="mt-10 text-center text-gray-400 text-sm">
    <p>
        Site made by <span class="text-red-500 font-bold">Legendary Smiley Cymor</span>
    </p>
    <p class="mt-2">
        Contact me via WhatsApp: <span class="text-white font-bold">0113821327</span>
    </p>
</footer>

<script>
let currentUrl = "";

/* detect platform */
function detect(url){
    if(url.includes("youtube")) return "YouTube";
    if(url.includes("tiktok")) return "TikTok";
    if(url.includes("facebook")) return "Facebook";
    return "Unknown Platform";
}

/* analyze link */
function analyzeLink(){
    const url = document.getElementById("urlInput").value.trim();
    if(!url) return alert("Paste a link first");

    currentUrl = url;

    document.getElementById("preview").classList.remove("hidden");
    document.getElementById("platform").innerText = detect(url);
    document.getElementById("status").innerText = "Ready to download";
}

/* download via BACKEND */
async function download(type){
    const res = await fetch("https://YOUR-BACKEND-URL/download", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            url: currentUrl,
            type: type
        })
    });

    const data = await res.json();

    if(data.success){
        window.open(data.download, "_blank");
        saveHistory(currentUrl);
    } else {
        alert("Failed: " + data.message);
    }
}

/* history system */
function saveHistory(url){
    let history = JSON.parse(localStorage.getItem("history") || "[]");
    history.unshift(url);
    history = history.slice(0, 5);

    localStorage.setItem("history", JSON.stringify(history));
    renderHistory();
}

function renderHistory(){
    let history = JSON.parse(localStorage.getItem("history") || "[]");
    document.getElementById("history").innerHTML =
        history.map(h => `<p>• ${h}</p>`).join("");
}

renderHistory();
</script>

</body>
  </html>
