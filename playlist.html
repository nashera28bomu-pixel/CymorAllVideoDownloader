<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Playlist — Cymor Bible</title>
  <link rel="manifest" href="./manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.05); }
    ::-webkit-scrollbar { width: 0px; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }
    .fade-in { animation: fadeIn 0.4s ease forwards; }

    @keyframes equalizer {
      0%,100% { height: 6px; } 25% { height: 18px; } 50% { height: 10px; } 75% { height: 20px; }
    }
    .eq-bar { animation: equalizer 0.8s ease-in-out infinite; }
    .eq-bar:nth-child(2) { animation-delay: 0.15s; }
    .eq-bar:nth-child(3) { animation-delay: 0.3s; }
    .eq-bar:nth-child(4) { animation-delay: 0.1s; }
    .eq-bars { display: flex; align-items: flex-end; gap: 2px; height: 24px; }
    .eq-bars.paused .eq-bar { animation-play-state: paused; }

    .track-active { background: rgba(168,85,247,0.15) !important; border-color: rgba(168,85,247,0.4) !important; }

    input[type=range] { accent-color: #a855f7; }

    .category-btn.active { background: #a855f7; color: white; border-color: #a855f7; }

    @keyframes spin { to {transform:rotate(360deg);} }
    .spinning { animation: spin 8s linear infinite; }
    .spinning.paused { animation-play-state: paused; }
  </style>
</head>

<body class="bg-[#0F172A] text-slate-100 min-h-screen pb-28">

  <header class="sticky top-0 z-50 bg-[#0F172A]/95 backdrop-blur border-b border-slate-800 px-4 py-3">
    <div class="max-w-md mx-auto flex items-center justify-between">
      <a href="index.html" class="text-blue-400 text-xs font-bold uppercase tracking-widest">← Home</a>
      <h1 class="text-sm font-bold tracking-tight">🎵 Music Center</h1>
      <div class="w-12"></div>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-6 space-y-6">

    <!-- NOW PLAYING -->
    <div class="relative overflow-hidden rounded-[32px] border border-purple-500/20 bg-slate-900/80 p-6 shadow-2xl">
      <div class="absolute inset-0 bg-gradient-to-br from-purple-900/20 to-transparent pointer-events-none"></div>

      <div class="flex items-center gap-4 mb-5">
        <div id="albumArt" class="w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-600 to-blue-600 flex items-center justify-center text-2xl shadow-lg spinning paused">🎵</div>
        <div class="flex-1 min-w-0">
          <p class="text-[10px] uppercase tracking-[0.25em] text-purple-400 font-bold mb-1">Now Playing</p>
          <p id="npTrackName" class="text-white font-bold text-base truncate">Select a track</p>
          <p id="npTrackCategory" class="text-slate-400 text-xs truncate">Choose from library below</p>
        </div>
        <div id="eqBars" class="eq-bars paused">
          <div class="eq-bar w-1 bg-purple-400 rounded-full"></div>
          <div class="eq-bar w-1 bg-purple-400 rounded-full"></div>
          <div class="eq-bar w-1 bg-purple-400 rounded-full"></div>
          <div class="eq-bar w-1 bg-purple-400 rounded-full"></div>
        </div>
      </div>

      <!-- Progress -->
      <div class="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden mb-2">
        <div id="musicProgress" class="h-full bg-purple-500 rounded-full transition-all duration-300" style="width:0%"></div>
      </div>
      <div class="flex justify-between text-[10px] text-slate-500 mb-5">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
      </div>

      <!-- Controls -->
      <div class="flex items-center justify-center gap-4 mb-5">
        <button onclick="prevTrack()" class="w-11 h-11 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center text-lg active:scale-95 transition-all">⏮</button>
        <button onclick="toggleMusicPlay()" id="musicPlayBtn" class="w-16 h-16 rounded-full bg-purple-600 flex items-center justify-center text-2xl shadow-lg shadow-purple-500/30 active:scale-95 transition-all">▶</button>
        <button onclick="nextTrack()" class="w-11 h-11 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center text-lg active:scale-95 transition-all">⏭</button>
        <button onclick="toggleShuffle()" id="shuffleBtn" class="w-11 h-11 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center text-sm active:scale-95 transition-all" title="Shuffle">🔀</button>
        <button onclick="toggleLoop()" id="loopBtn" class="w-11 h-11 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center text-sm active:scale-95 transition-all" title="Loop">🔁</button>
      </div>

      <!-- Volume -->
      <div class="flex items-center gap-3">
        <span class="text-slate-500 text-sm">🔈</span>
        <input type="range" id="musicVolume" min="0" max="1" step="0.05" value="0.7" class="flex-1 cursor-pointer" oninput="setMusicVolume(this.value)">
        <span class="text-slate-500 text-sm">🔊</span>
      </div>
    </div>

    <!-- ADD CUSTOM TRACK (YouTube/URL) -->
    <div class="rounded-[24px] border border-slate-800 bg-slate-900/50 p-5 space-y-3">
      <p class="text-[10px] uppercase tracking-[0.25em] text-slate-500 font-bold">Add Your Own Music</p>
      <p class="text-slate-400 text-xs">Paste a direct audio URL (.mp3, .ogg, .wav) or upload a file from your device</p>

      <div class="flex gap-2">
        <input id="urlInput" type="url" placeholder="https://example.com/song.mp3"
          class="flex-1 bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-xl px-3 py-3 outline-none focus:border-purple-500 transition-all"/>
        <button onclick="addByUrl()" class="px-4 py-3 bg-purple-600 rounded-xl text-xs font-bold active:scale-95 transition-all">Add</button>
      </div>

      <div class="flex items-center gap-2">
        <div class="flex-1 h-px bg-slate-700"></div>
        <span class="text-slate-600 text-xs">or</span>
        <div class="flex-1 h-px bg-slate-700"></div>
      </div>

      <label class="flex items-center justify-center gap-2 w-full p-3 rounded-xl bg-slate-800 border border-slate-700 border-dashed cursor-pointer active:scale-95 transition-all">
        <span class="text-purple-400 text-sm">📂</span>
        <span class="text-slate-400 text-xs font-bold uppercase tracking-wider">Upload from Device</span>
        <input type="file" accept="audio/*" class="hidden" onchange="uploadFile(this)">
      </label>
    </div>

    <!-- CATEGORY FILTER -->
    <div>
      <p class="text-[10px] uppercase tracking-[0.25em] text-slate-500 font-bold mb-3 px-1">Browse by Category</p>
      <div class="flex gap-2 flex-wrap">
        <button class="category-btn active px-3 py-1.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-bold transition-all" onclick="filterCategory('all', this)">All</button>
        <button class="category-btn px-3 py-1.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-bold transition-all" onclick="filterCategory('worship', this)">Worship</button>
        <button class="category-btn px-3 py-1.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-bold transition-all" onclick="filterCategory('gospel', this)">Gospel</button>
        <button class="category-btn px-3 py-1.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-bold transition-all" onclick="filterCategory('ambient', this)">Ambient</button>
        <button class="category-btn px-3 py-1.5 rounded-xl bg-slate-800 border border-slate-700 text-xs font-bold transition-all" onclick="filterCategory('custom', this)">My Music</button>
      </div>
    </div>

    <!-- TRACK LIBRARY -->
    <div>
      <p class="text-[10px] uppercase tracking-[0.25em] text-slate-500 font-bold mb-3 px-1">Track Library</p>
      <div id="trackLibrary" class="space-y-2"></div>
    </div>

  </main>

  <!-- NAV -->
  <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-800 px-8 py-4 flex justify-between items-center z-[100]">
    <a href="index.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
      <span class="text-[10px]">Home</span>
    </a>
    <a href="bible.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg>
      <span class="text-[10px]">Bible</span>
    </a>
    <a href="audio.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"/></svg>
      <span class="text-[10px]">Audio</span>
    </a>
    <a href="playlist.html" class="flex flex-col items-center gap-1 text-purple-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.82l8-1.6v5.894A4.37 4.37 0 0015 12c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"/></svg>
      <span class="text-[10px]">Music</span>
    </a>
    <a href="trivia.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/></svg>
      <span class="text-[10px]">Trivia</span>
    </a>
  </nav>

  <script>
    // Built-in track library (public domain / royalty-free ambient tracks via CDN)
    const BUILT_IN_TRACKS = [
      { id: 'b1', name: 'Peaceful Waters', category: 'ambient', emoji: '🌊', url: 'https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3', note: 'Gentle ambience' },
      { id: 'b2', name: 'Morning Worship Ambience', category: 'worship', emoji: '🙏', url: '', note: 'Upload your own worship music' },
      { id: 'b3', name: 'Gospel Praise Beat', category: 'gospel', emoji: '✝️', url: '', note: 'Upload your own gospel music' },
      { id: 'b4', name: 'Quiet Time Instrumental', category: 'ambient', emoji: '🕯️', url: '', note: 'Upload your own instrumental' },
    ];

    let tracks = [...BUILT_IN_TRACKS];
    let customTracks = JSON.parse(localStorage.getItem('cymorCustomTracks') || '[]');
    tracks = [...tracks, ...customTracks];

    let currentTrackIdx = -1;
    let audio = null;
    let isPlaying = false;
    let shuffle = false;
    let loop = false;
    let currentCategory = 'all';

    function saveCustom() {
      localStorage.setItem('cymorCustomTracks', JSON.stringify(customTracks));
    }

    function renderTracks() {
      const container = document.getElementById('trackLibrary');
      const filtered = currentCategory === 'all' ? tracks : tracks.filter(t => t.category === currentCategory);
      if (filtered.length === 0) {
        container.innerHTML = `<div class="text-center py-8 text-slate-500 text-sm">No tracks in this category yet.</div>`;
        return;
      }
      container.innerHTML = filtered.map((t, fi) => {
        const globalIdx = tracks.indexOf(t);
        const isActive = globalIdx === currentTrackIdx;
        const hasUrl = !!t.url;
        return `
          <div id="track_${globalIdx}" onclick="playTrack(${globalIdx})"
            class="flex items-center gap-3 p-4 rounded-2xl border border-slate-800 bg-slate-900/50 cursor-pointer transition-all ${isActive ? 'track-active' : ''} active:scale-[0.98]">
            <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-lg shrink-0">${t.emoji}</div>
            <div class="flex-1 min-w-0">
              <p class="text-white text-sm font-semibold truncate">${t.name}</p>
              <p class="text-slate-500 text-xs capitalize">${t.category} ${!hasUrl ? '· tap to add URL' : ''}</p>
            </div>
            <div class="flex items-center gap-2">
              ${isActive && isPlaying ? `<div class="eq-bars"><div class="eq-bar w-1 bg-purple-400 rounded-full"></div><div class="eq-bar w-1 bg-purple-400 rounded-full"></div><div class="eq-bar w-1 bg-purple-400 rounded-full"></div></div>` : ''}
              ${t.category === 'custom' ? `<button onclick="removeCustom('${t.id}', event)" class="text-slate-600 hover:text-red-400 text-xs p-1">✕</button>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function playTrack(idx) {
      if (!tracks[idx] || !tracks[idx].url) {
        alert('This track has no audio URL. Add one via the "Add Your Own Music" section above, or upload a file.');
        return;
      }
      currentTrackIdx = idx;
      const t = tracks[idx];

      if (audio) { audio.pause(); audio.src = ''; }
      audio = new Audio(t.url);
      audio.volume = parseFloat(document.getElementById('musicVolume').value);
      audio.loop = loop;

      audio.addEventListener('timeupdate', updateMusicProgress);
      audio.addEventListener('ended', () => { if (!loop) nextTrack(); });
      audio.addEventListener('loadedmetadata', () => {
        document.getElementById('totalTime').textContent = formatTime(audio.duration);
      });
      audio.addEventListener('error', () => {
        alert('Could not load audio. Check the URL or try another file.');
        isPlaying = false; updateMusicBtn();
      });

      audio.play().then(() => {
        isPlaying = true;
        updateMusicBtn();
        updateNowPlaying(t);
        renderTracks();
        startAlbumSpin();
      }).catch(() => {
        alert('Playback blocked. Tap again to play.');
      });
    }

    function toggleMusicPlay() {
      if (!audio) { alert('Select a track first.'); return; }
      if (isPlaying) {
        audio.pause(); isPlaying = false;
        stopAlbumSpin();
      } else {
        audio.play(); isPlaying = true;
        startAlbumSpin();
      }
      updateMusicBtn();
    }

    function prevTrack() {
      if (currentTrackIdx > 0) playTrack(currentTrackIdx - 1);
    }

    function nextTrack() {
      if (shuffle) {
        let r = Math.floor(Math.random() * tracks.length);
        playTrack(r);
      } else if (currentTrackIdx < tracks.length - 1) {
        playTrack(currentTrackIdx + 1);
      }
    }

    function toggleShuffle() {
      shuffle = !shuffle;
      document.getElementById('shuffleBtn').style.background = shuffle ? 'rgba(168,85,247,0.3)' : '';
      document.getElementById('shuffleBtn').style.borderColor = shuffle ? '#a855f7' : '';
    }

    function toggleLoop() {
      loop = !loop;
      if (audio) audio.loop = loop;
      document.getElementById('loopBtn').style.background = loop ? 'rgba(168,85,247,0.3)' : '';
      document.getElementById('loopBtn').style.borderColor = loop ? '#a855f7' : '';
    }

    function setMusicVolume(val) {
      if (audio) audio.volume = parseFloat(val);
    }

    function updateMusicProgress() {
      if (!audio || !audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      document.getElementById('musicProgress').style.width = pct + '%';
      document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
    }

    function updateMusicBtn() {
      document.getElementById('musicPlayBtn').textContent = isPlaying ? '⏸' : '▶';
      document.getElementById('eqBars').classList.toggle('paused', !isPlaying);
    }

    function updateNowPlaying(t) {
      document.getElementById('npTrackName').textContent = t.name;
      document.getElementById('npTrackCategory').textContent = t.category.charAt(0).toUpperCase() + t.category.slice(1);
      document.getElementById('albumArt').textContent = t.emoji;
    }

    function startAlbumSpin() {
      document.getElementById('albumArt').classList.remove('paused');
    }
    function stopAlbumSpin() {
      document.getElementById('albumArt').classList.add('paused');
    }

    function formatTime(s) {
      if (!s || isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    function filterCategory(cat, btn) {
      currentCategory = cat;
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTracks();
    }

    function addByUrl() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) { alert('Please enter a valid audio URL.'); return; }
      const name = prompt('Track name?', 'My Track') || 'Custom Track';
      const track = { id: 'c' + Date.now(), name, category: 'custom', emoji: '🎵', url, note: 'Custom' };
      customTracks.push(track);
      tracks.push(track);
      saveCustom();
      document.getElementById('urlInput').value = '';
      renderTracks();
    }

    function uploadFile(input) {
      const file = input.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const name = file.name.replace(/\.[^.]+$/, '');
      const track = { id: 'c' + Date.now(), name, category: 'custom', emoji: '🎵', url, note: 'Uploaded' };
      customTracks.push(track);
      tracks.push(track);
      saveCustom();
      renderTracks();
    }

    function removeCustom(id, e) {
      e.stopPropagation();
      customTracks = customTracks.filter(t => t.id !== id);
      tracks = tracks.filter(t => t.id !== id);
      saveCustom();
      renderTracks();
    }

    renderTracks();
  </script>
</body>
</html>
