<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music — Cymor Bible</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0F172A">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.05); }
    ::-webkit-scrollbar { width: 0px; }
    .track-row.playing { border-color: #f59e0b; background: rgba(245,158,11,0.08); }
    @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
    .fade-in { animation: fadeIn 0.35s ease forwards; }
  </style>
</head>
<body class="bg-[#0F172A] text-slate-100 min-h-screen pb-40">

  <header class="sticky top-0 z-50 bg-[#0F172A]/95 backdrop-blur border-b border-slate-800 px-4 py-3">
    <div class="max-w-md mx-auto flex items-center justify-between">
      <a href="index.html" class="text-blue-400 text-xs font-bold uppercase tracking-widest">← Home</a>
      <h1 class="text-sm font-bold tracking-tight">🎵 Music</h1>
      <div class="w-12"></div>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-5 space-y-5">

    <div class="rounded-[20px] border border-blue-500/20 bg-blue-500/5 p-4">
      <p class="text-[11px] text-blue-200 leading-relaxed">
        Add a direct link to an MP3 (worship, instrumental, ambient — anything you like) and play it in the background while you read or pray. It'll keep playing as you move between pages.
      </p>
    </div>

    <!-- ADD TRACK -->
    <div class="rounded-[24px] border border-slate-800 bg-slate-900/50 p-5">
      <p class="text-[10px] uppercase tracking-[0.25em] text-slate-500 font-bold mb-3">Add a Track</p>
      <input id="trackTitle" type="text" placeholder="Track name (e.g. Peaceful Piano)" class="w-full bg-slate-800/60 border border-slate-700 rounded-xl p-3 text-sm text-slate-100 placeholder-slate-500 mb-2 focus:outline-none focus:border-amber-500/50">
      <input id="trackUrl" type="url" placeholder="Direct MP3 link (https://...)" class="w-full bg-slate-800/60 border border-slate-700 rounded-xl p-3 text-sm text-slate-100 placeholder-slate-500 mb-3 focus:outline-none focus:border-amber-500/50">
      <button onclick="addTrack()" class="w-full bg-amber-500 text-slate-900 text-xs font-bold uppercase tracking-wider py-3 rounded-xl active:scale-95 transition">
        Add to Playlist
      </button>
    </div>

    <!-- PLAYLIST -->
    <div class="space-y-3" id="playlistContainer"></div>

  </main>

  <!-- NAV -->
  <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-800 px-6 py-4 flex justify-between items-center z-[100]">
    <a href="index.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
      <span class="text-[10px]">Home</span>
    </a>
    <a href="bible.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg>
      <span class="text-[10px]">Bible</span>
    </a>
    <a href="trivia.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/></svg>
      <span class="text-[10px]">Trivia</span>
    </a>
    <a href="prayer.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
      <span class="text-[10px]">Prayer</span>
    </a>
    <a href="settings.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
      <span class="text-[10px]">Settings</span>
    </a>
  </nav>

  <script src="./cymor-shared.js"></script>
  <script>
    function addTrack() {
      const title = document.getElementById('trackTitle').value.trim();
      const url = document.getElementById('trackUrl').value.trim();
      if (!title || !url) { alert('Add both a name and a link.'); return; }
      const list = CYMOR.getPlaylist();
      list.push({ id: Date.now(), title, url });
      CYMOR.savePlaylist(list);
      document.getElementById('trackTitle').value = '';
      document.getElementById('trackUrl').value = '';
      renderPlaylist();
    }

    function removeTrack(id) {
      CYMOR.savePlaylist(CYMOR.getPlaylist().filter(t => t.id !== id));
      renderPlaylist();
    }

    function playTrack(track) {
      CYMOR.setPlayerState({ url: track.url, title: track.title, playing: true, time: 0 });
      const existingAudio = document.getElementById('cymorAudioEl');
      if (existingAudio) existingAudio.remove(); // force reload with new track
      CYMOR.renderMiniPlayer();
      renderPlaylist();
    }

    function renderPlaylist() {
      const list = CYMOR.getPlaylist();
      const current = CYMOR.getPlayerState();
      const container = document.getElementById('playlistContainer');
      if (!list.length) {
        container.innerHTML = '<p class="text-slate-600 text-xs text-center py-8">No tracks yet — add your first one above.</p>';
        return;
      }
      container.innerHTML = list.map(t => `
        <div class="track-row fade-in rounded-2xl border border-slate-800 bg-slate-900/50 p-4 flex items-center gap-3 ${current && current.url === t.url && current.playing ? 'playing' : ''}">
          <button onclick='playTrack(${JSON.stringify(t)})' class="w-11 h-11 rounded-full bg-amber-500/10 border border-amber-500/30 flex items-center justify-center text-amber-400 shrink-0 active:scale-95 transition">▶</button>
          <p class="text-sm text-slate-100 font-medium flex-1 truncate">${t.title}</p>
          <button onclick="removeTrack(${t.id})" class="text-red-400 text-[10px] font-bold uppercase tracking-wider shrink-0">Remove</button>
        </div>`).join('');
    }

    renderPlaylist();
    CYMOR.startNotificationScheduler();
    CYMOR.renderMiniPlayer();
  </script>
</body>
</html>
