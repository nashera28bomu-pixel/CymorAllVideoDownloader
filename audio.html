<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Audio Bible — Cymor Bible</title>
  <link rel="manifest" href="./manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.05); }
    ::-webkit-scrollbar { width: 0px; }

    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease forwards; }

    .speaking-ring {
      animation: pulse-ring 1.2s cubic-bezier(0.4,0,0.6,1) infinite;
    }

    .verse-reading {
      background: rgba(59, 130, 246, 0.15);
      border-color: rgba(59, 130, 246, 0.4) !important;
      transform: scale(1.01);
    }

    .progress-bar {
      transition: width 0.3s linear;
    }

    select { appearance: none; -webkit-appearance: none; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }

    .speed-btn.active { background: #3b82f6; color: white; }
  </style>
</head>

<body class="bg-[#0F172A] text-slate-100 min-h-screen pb-28">

  <!-- HEADER -->
  <header class="sticky top-0 z-50 bg-[#0F172A]/95 backdrop-blur border-b border-slate-800 px-4 py-3">
    <div class="max-w-md mx-auto flex items-center justify-between">
      <a href="index.html" class="text-blue-400 text-xs font-bold uppercase tracking-widest">← Home</a>
      <h1 class="text-sm font-bold tracking-tight">🎙 Audio Bible</h1>
      <div class="w-12"></div>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-6 space-y-6">

    <!-- NOW PLAYING CARD -->
    <div id="playerCard" class="relative overflow-hidden rounded-[32px] border border-blue-500/20 bg-slate-900/80 p-6 shadow-2xl">
      <div class="absolute inset-0 bg-gradient-to-br from-blue-900/20 to-transparent pointer-events-none"></div>

      <!-- Speaking Indicator -->
      <div id="speakingIndicator" class="hidden flex items-center justify-center mb-5">
        <div class="relative w-16 h-16">
          <div class="speaking-ring absolute inset-0 rounded-full border-2 border-blue-400/50"></div>
          <div class="absolute inset-0 rounded-full bg-blue-600/20 border border-blue-500/40 flex items-center justify-center">
            <span class="text-2xl">🎙</span>
          </div>
        </div>
      </div>
      <div id="idleIcon" class="flex items-center justify-center mb-5">
        <div class="w-16 h-16 rounded-full bg-slate-800/80 border border-slate-700 flex items-center justify-center">
          <span class="text-2xl">📖</span>
        </div>
      </div>

      <p id="npLabel" class="text-center text-[10px] uppercase tracking-[0.3em] text-blue-400 font-bold mb-1">Select a Chapter</p>
      <h2 id="npTitle" class="text-center text-xl font-bold text-white mb-4">Choose Book & Chapter</h2>

      <!-- Progress Bar -->
      <div class="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden mb-5">
        <div id="progressBar" class="progress-bar h-full bg-blue-500 rounded-full" style="width:0%"></div>
      </div>

      <!-- Verse Counter -->
      <p id="verseCounter" class="text-center text-xs text-slate-500 mb-5">— / — verses</p>

      <!-- Controls -->
      <div class="flex items-center justify-center gap-4">
        <button onclick="prevVerse()" class="w-11 h-11 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center text-lg active:scale-95 transition-all">⏮</button>
        <button onclick="togglePlay()" id="playBtn" class="w-16 h-16 rounded-full bg-blue-600 flex items-center justify-center text-2xl shadow-lg shadow-blue-500/30 active:scale-95 transition-all">▶</button>
        <button onclick="nextVerse()" class="w-11 h-11 rounded-2xl bg-slate-800 border border-slate-700 flex items-center justify-center text-lg active:scale-95 transition-all">⏭</button>
      </div>

      <!-- Speed Controls -->
      <div class="flex items-center justify-center gap-2 mt-5">
        <span class="text-[10px] text-slate-500 uppercase tracking-wider mr-1">Speed</span>
        <button class="speed-btn active px-3 py-1.5 rounded-xl bg-slate-800 text-xs font-bold border border-slate-700 transition-all" data-speed="0.8" onclick="setSpeed(0.8, this)">0.8x</button>
        <button class="speed-btn px-3 py-1.5 rounded-xl bg-slate-800 text-xs font-bold border border-slate-700 transition-all" data-speed="1" onclick="setSpeed(1, this)">1x</button>
        <button class="speed-btn px-3 py-1.5 rounded-xl bg-slate-800 text-xs font-bold border border-slate-700 transition-all" data-speed="1.25" onclick="setSpeed(1.25, this)">1.25x</button>
        <button class="speed-btn px-3 py-1.5 rounded-xl bg-slate-800 text-xs font-bold border border-slate-700 transition-all" data-speed="1.5" onclick="setSpeed(1.5, this)">1.5x</button>
      </div>
    </div>

    <!-- BOOK / CHAPTER SELECTOR -->
    <div class="space-y-3">
      <p class="text-[10px] uppercase tracking-[0.25em] text-slate-500 font-bold px-1">Select Scripture</p>

      <select id="audioTestament" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl text-sm outline-none focus:border-blue-500 cursor-pointer text-slate-200">
        <option value="">Choose Testament</option>
        <option value="OT">Old Testament</option>
        <option value="NT">New Testament</option>
      </select>

      <div class="grid grid-cols-2 gap-3">
        <select id="audioBook" disabled class="p-4 bg-slate-900 border border-slate-800 rounded-2xl text-sm outline-none opacity-50 cursor-pointer text-slate-200 transition-all">
          <option value="">Select Book</option>
        </select>
        <select id="audioChapter" disabled class="p-4 bg-slate-900 border border-slate-800 rounded-2xl text-sm outline-none opacity-50 cursor-pointer text-slate-200 transition-all">
          <option value="">Select Chapter</option>
        </select>
      </div>

      <button onclick="startReading()" class="w-full bg-blue-600 text-white p-4 rounded-2xl text-xs font-bold uppercase tracking-wider active:scale-95 transition-all shadow-lg shadow-blue-500/20">
        🎙 Start Audio Reading
      </button>
    </div>

    <!-- CURRENT VERSE DISPLAY -->
    <div id="verseDisplay" class="hidden space-y-2">
      <p class="text-[10px] uppercase tracking-[0.25em] text-slate-500 font-bold px-1">Now Reading</p>
      <div id="verseList" class="space-y-2 max-h-80 overflow-y-auto pr-1"></div>
    </div>

    <!-- VOICE SETTINGS -->
    <div class="rounded-[24px] border border-slate-800 bg-slate-900/50 p-5 space-y-4">
      <p class="text-[10px] uppercase tracking-[0.25em] text-slate-500 font-bold">Voice Settings</p>

      <div>
        <label class="text-xs text-slate-400 mb-2 block">Voice</label>
        <select id="voiceSelect" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-sm outline-none text-slate-200">
          <option value="">Loading voices...</option>
        </select>
      </div>

      <div>
        <label class="text-xs text-slate-400 mb-2 block">Volume — <span id="volLabel">100%</span></label>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1"
          class="w-full accent-blue-500 cursor-pointer"
          oninput="setVolume(this.value)">
      </div>

      <div>
        <label class="text-xs text-slate-400 mb-2 block">Pitch — <span id="pitchLabel">1.0</span></label>
        <input type="range" id="pitchSlider" min="0.5" max="2" step="0.1" value="1"
          class="w-full accent-blue-500 cursor-pointer"
          oninput="setPitch(this.value)">
      </div>
    </div>

  </main>

  <!-- NAV -->
  <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-800 px-8 py-4 flex justify-between items-center z-[100]">
    <a href="index.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
      <span class="text-[10px]">Home</span>
    </a>
    <a href="bible.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg>
      <span class="text-[10px]">Bible</span>
    </a>
    <a href="audio.html" class="flex flex-col items-center gap-1 text-blue-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"/></svg>
      <span class="text-[10px]">Audio</span>
    </a>
    <a href="playlist.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.82l8-1.6v5.894A4.37 4.37 0 0015 12c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"/></svg>
      <span class="text-[10px]">Music</span>
    </a>
    <a href="trivia.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/></svg>
      <span class="text-[10px]">Trivia</span>
    </a>
  </nav>

  <script>
    const OT = ["Genesis","Exodus","Leviticus","Numbers","Deuteronomy","Joshua","Judges","Ruth","1 Samuel","2 Samuel","1 Kings","2 Kings","1 Chronicles","2 Chronicles","Ezra","Nehemiah","Esther","Job","Psalms","Proverbs","Ecclesiastes","Song of Solomon","Isaiah","Jeremiah","Lamentations","Ezekiel","Daniel","Hosea","Joel","Amos","Obadiah","Jonah","Micah","Nahum","Habakkuk","Zephaniah","Haggai","Zechariah","Malachi"];
    const NT = ["Matthew","Mark","Luke","John","Acts","Romans","1 Corinthians","2 Corinthians","Galatians","Ephesians","Philippians","Colossians","1 Thessalonians","2 Thessalonians","1 Timothy","2 Timothy","Titus","Philemon","Hebrews","James","1 Peter","2 Peter","1 John","2 John","3 John","Jude","Revelation"];

    let bibleData = [];
    let currentVerses = [];
    let currentIndex = 0;
    let isPlaying = false;
    let utterance = null;
    let speechRate = 0.8;
    let speechVolume = 1;
    let speechPitch = 1;
    let voices = [];
    let selectedVoice = null;
    let currentBook = '';
    let currentChapter = 0;

    // Load voices
    function loadVoices() {
      voices = speechSynthesis.getVoices();
      const sel = document.getElementById('voiceSelect');
      sel.innerHTML = '';
      if (voices.length === 0) {
        sel.innerHTML = '<option>No voices available</option>';
        return;
      }
      voices.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${v.name} (${v.lang})`;
        sel.appendChild(opt);
      });
      // prefer english
      const engIdx = voices.findIndex(v => v.lang.startsWith('en'));
      if (engIdx > -1) sel.value = engIdx;
      selectedVoice = voices[engIdx > -1 ? engIdx : 0];
    }

    speechSynthesis.onvoiceschanged = loadVoices;
    window.addEventListener('load', () => { loadVoices(); loadBible(); });

    document.getElementById('voiceSelect').addEventListener('change', (e) => {
      selectedVoice = voices[e.target.value];
    });

    async function loadBible() {
      try {
        const r = await fetch('./en_kjv.json');
        bibleData = await r.json();
      } catch(e) { console.error(e); }
    }

    // Testament change
    document.getElementById('audioTestament').addEventListener('change', (e) => {
      const val = e.target.value;
      const bookSel = document.getElementById('audioBook');
      bookSel.innerHTML = '<option value="">Select Book</option>';
      document.getElementById('audioChapter').innerHTML = '<option value="">Select Chapter</option>';
      document.getElementById('audioChapter').disabled = true;
      document.getElementById('audioChapter').classList.add('opacity-50');
      if (!val) { bookSel.disabled = true; bookSel.classList.add('opacity-50'); return; }
      const allowed = val === 'OT' ? OT : NT;
      const filtered = bibleData.filter(b => allowed.includes(b.name));
      filtered.forEach(b => {
        const o = document.createElement('option');
        o.value = b.name; o.textContent = b.name;
        bookSel.appendChild(o);
      });
      bookSel.disabled = false; bookSel.classList.remove('opacity-50');
    });

    document.getElementById('audioBook').addEventListener('change', (e) => {
      const book = bibleData.find(b => b.name === e.target.value);
      const chSel = document.getElementById('audioChapter');
      chSel.innerHTML = '<option value="">Select Chapter</option>';
      if (!book) return;
      book.chapters.forEach((_, i) => {
        const o = document.createElement('option');
        o.value = i; o.textContent = `Chapter ${i+1}`;
        chSel.appendChild(o);
      });
      chSel.disabled = false; chSel.classList.remove('opacity-50');
    });

    function startReading() {
      const bookName = document.getElementById('audioBook').value;
      const chIdx = document.getElementById('audioChapter').value;
      if (!bookName || chIdx === '') { alert('Please select a book and chapter first.'); return; }
      const book = bibleData.find(b => b.name === bookName);
      if (!book) return;
      currentVerses = book.chapters[parseInt(chIdx)];
      currentBook = bookName;
      currentChapter = parseInt(chIdx);
      currentIndex = 0;
      stopSpeech();
      renderVerseList();
      document.getElementById('verseDisplay').classList.remove('hidden');
      document.getElementById('npLabel').textContent = bookName;
      document.getElementById('npTitle').textContent = `Chapter ${currentChapter + 1}`;
      playCurrentVerse();
    }

    function renderVerseList() {
      const container = document.getElementById('verseList');
      container.innerHTML = currentVerses.map((v, i) => `
        <div id="vline_${i}" onclick="jumpToVerse(${i})"
          class="flex gap-3 p-3 rounded-2xl border border-slate-800 bg-slate-900/50 cursor-pointer transition-all">
          <span class="text-blue-500/60 font-bold text-xs mt-0.5 w-5 shrink-0">${i+1}</span>
          <p class="text-slate-300 text-sm leading-relaxed">${v}</p>
        </div>
      `).join('');
    }

    function playCurrentVerse() {
      if (!currentVerses.length) return;
      stopSpeech();
      isPlaying = true;
      updatePlayBtn();
      highlightVerse(currentIndex);
      updateProgress();

      utterance = new SpeechSynthesisUtterance(currentVerses[currentIndex]);
      utterance.rate = speechRate;
      utterance.volume = speechVolume;
      utterance.pitch = speechPitch;
      if (selectedVoice) utterance.voice = selectedVoice;

      utterance.onend = () => {
        currentIndex++;
        if (currentIndex < currentVerses.length) {
          playCurrentVerse();
        } else {
          isPlaying = false;
          currentIndex = currentVerses.length - 1;
          updatePlayBtn();
          updateProgress();
          showIdleState();
        }
      };

      utterance.onerror = () => { isPlaying = false; updatePlayBtn(); };

      speechSynthesis.speak(utterance);
      showSpeakingState();
    }

    function togglePlay() {
      if (isPlaying) {
        speechSynthesis.pause();
        isPlaying = false;
        updatePlayBtn();
        showIdleState();
      } else {
        if (speechSynthesis.paused) {
          speechSynthesis.resume();
          isPlaying = true;
          updatePlayBtn();
          showSpeakingState();
        } else {
          playCurrentVerse();
        }
      }
    }

    function prevVerse() {
      if (currentIndex > 0) { currentIndex--; playCurrentVerse(); }
    }

    function nextVerse() {
      if (currentIndex < currentVerses.length - 1) { currentIndex++; playCurrentVerse(); }
    }

    function jumpToVerse(i) {
      currentIndex = i;
      playCurrentVerse();
    }

    function stopSpeech() {
      speechSynthesis.cancel();
      isPlaying = false;
    }

    function highlightVerse(idx) {
      document.querySelectorAll('[id^="vline_"]').forEach((el, i) => {
        el.classList.toggle('verse-reading', i === idx);
      });
      const el = document.getElementById(`vline_${idx}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      document.getElementById('verseCounter').textContent = `${idx+1} / ${currentVerses.length} verses`;
    }

    function updateProgress() {
      const pct = currentVerses.length ? ((currentIndex+1) / currentVerses.length) * 100 : 0;
      document.getElementById('progressBar').style.width = pct + '%';
    }

    function updatePlayBtn() {
      document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
    }

    function showSpeakingState() {
      document.getElementById('speakingIndicator').classList.remove('hidden');
      document.getElementById('speakingIndicator').classList.add('flex');
      document.getElementById('idleIcon').classList.add('hidden');
    }

    function showIdleState() {
      document.getElementById('speakingIndicator').classList.add('hidden');
      document.getElementById('speakingIndicator').classList.remove('flex');
      document.getElementById('idleIcon').classList.remove('hidden');
    }

    function setSpeed(val, btn) {
      speechRate = val;
      document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (isPlaying) { playCurrentVerse(); }
    }

    function setVolume(val) {
      speechVolume = parseFloat(val);
      document.getElementById('volLabel').textContent = Math.round(val * 100) + '%';
    }

    function setPitch(val) {
      speechPitch = parseFloat(val);
      document.getElementById('pitchLabel').textContent = parseFloat(val).toFixed(1);
    }
  </script>
</body>
</html>
