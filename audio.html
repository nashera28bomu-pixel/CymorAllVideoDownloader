<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Audio Bible — Cymor Bible</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0F172A">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .serif { font-family: 'Playfair Display', serif; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.05); }
    ::-webkit-scrollbar { width: 0px; }
    .verse-line { transition: background 0.2s ease, color 0.2s ease; }
    .verse-line.reading { background: rgba(245,158,11,0.14); border-radius: 8px; color: #fbbf24; }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    .pulse-dot { animation: pulse 1.2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-[#0F172A] text-slate-100 min-h-screen pb-40">

  <header class="sticky top-0 z-50 bg-[#0F172A]/95 backdrop-blur border-b border-slate-800 px-4 py-3">
    <div class="max-w-md mx-auto flex items-center justify-between gap-2">
      <a href="index.html" class="text-blue-400 text-xs font-bold uppercase tracking-widest shrink-0">← Home</a>
      <button onclick="openBookPicker()" id="bookChapterLabel" class="text-sm font-bold tracking-tight truncate px-2">🎧 Genesis 1</button>
      <a href="bible.html" class="text-blue-400 text-xs font-bold uppercase tracking-widest shrink-0">Read →</a>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-5 space-y-4">

    <div class="rounded-[20px] border border-amber-500/20 bg-amber-500/5 p-4 text-center">
      <p class="text-[11px] text-amber-200 leading-relaxed">
        This uses your device's built-in voice to read scripture aloud — no huge audio files to download, works even on a shaky connection.
      </p>
    </div>

    <div id="chapterContainer" class="space-y-1 rounded-[24px] border border-slate-800 bg-slate-900/50 p-5"></div>

  </main>

  <!-- STICKY PLAYER -->
  <div class="fixed bottom-[76px] left-0 right-0 z-[110] px-4">
    <div class="max-w-md mx-auto glass rounded-[24px] p-4 space-y-3">
      <div class="flex items-center justify-between">
        <span class="text-xs font-bold text-slate-400" id="playerStatus">Ready</span>
        <span class="text-xs font-bold text-amber-400" id="playerVerseCount"></span>
      </div>
      <div class="flex items-center justify-center gap-4">
        <button onclick="skipVerse(-1)" class="w-11 h-11 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center active:scale-95 transition">⏮</button>
        <button onclick="togglePlay()" id="playBtn" class="w-16 h-16 rounded-full bg-amber-500 text-slate-900 flex items-center justify-center text-2xl active:scale-95 transition">▶</button>
        <button onclick="skipVerse(1)" class="w-11 h-11 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center active:scale-95 transition">⏭</button>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-[10px] text-slate-500 font-bold">SPEED</span>
        <input type="range" min="0.6" max="1.6" step="0.1" value="1" id="speedSlider" oninput="updateSpeed(this.value)" class="flex-1 accent-amber-500">
        <span class="text-[10px] text-amber-400 font-bold w-8" id="speedVal">1.0x</span>
      </div>
    </div>
  </div>

  <!-- BOOK PICKER SHEET -->
  <div id="bookSheet" class="fixed inset-0 bg-black/60 z-[200] hidden items-end" onclick="if(event.target===this) closeBookPicker()">
    <div class="glass w-full rounded-t-[28px] max-h-[75vh] flex flex-col">
      <div class="px-5 py-4 border-b border-slate-800 flex items-center justify-between">
        <p class="font-bold text-sm">Choose a book</p>
        <button onclick="closeBookPicker()" class="text-slate-400 text-sm">Done</button>
      </div>
      <div id="bookList" class="overflow-y-auto p-3 grid grid-cols-3 gap-2"></div>
    </div>
  </div>
  <div id="chapterSheet" class="fixed inset-0 bg-black/60 z-[200] hidden items-end" onclick="if(event.target===this) closeChapterPicker()">
    <div class="glass w-full rounded-t-[28px] max-h-[70vh] flex flex-col">
      <div class="px-5 py-4 border-b border-slate-800 flex items-center justify-between">
        <p class="font-bold text-sm" id="chapterSheetTitle">Chapter</p>
        <button onclick="closeChapterPicker()" class="text-slate-400 text-sm">Done</button>
      </div>
      <div id="chapterGrid" class="overflow-y-auto p-3 grid grid-cols-6 gap-2"></div>
    </div>
  </div>

  <!-- NAV -->
  <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-800 px-6 py-4 flex justify-between items-center z-[100]">
    <a href="index.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
      <span class="text-[10px]">Home</span>
    </a>
    <a href="bible.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg>
      <span class="text-[10px]">Bible</span>
    </a>
    <a href="trivia.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/></svg>
      <span class="text-[10px]">Trivia</span>
    </a>
    <a href="prayer.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
      <span class="text-[10px]">Prayer</span>
    </a>
    <a href="settings.html" class="flex flex-col items-center gap-1 text-slate-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
      <span class="text-[10px]">Settings</span>
    </a>
  </nav>

  <script src="./cymor-shared.js"></script>
  <script>
    let state = { bookSlug: 'genesis', bookLabel: 'Genesis', chapter: 1, maxChapter: 50 };
    let verses = [];
    let currentIdx = 0;
    let playing = false;
    let voiceRate = 1.0;
    let synthVoice = null;

    function pickVoice() {
      const voices = speechSynthesis.getVoices();
      synthVoice = voices.find(v => v.lang.startsWith('en') && /female|zira|samantha/i.test(v.name)) || voices.find(v => v.lang.startsWith('en')) || voices[0];
    }
    if ('speechSynthesis' in window) {
      speechSynthesis.onvoiceschanged = pickVoice;
      pickVoice();
    }

    function updateHeaderLabel() {
      document.getElementById('bookChapterLabel').textContent = '🎧 ' + state.bookLabel + ' ' + state.chapter;
    }

    async function loadChapter() {
      stopReading();
      const container = document.getElementById('chapterContainer');
      container.innerHTML = '<p class="text-slate-500 text-sm text-center py-10">Loading chapter…</p>';
      updateHeaderLabel();
      try {
        const en = await CYMOR.fetchChapter(state.bookSlug, state.chapter, 'en');
        verses = en.verses;
        currentIdx = 0;
        container.innerHTML = verses.map((v, i) => `
          <p class="verse-line p-2 text-[15px] leading-relaxed" id="vline-${i}">
            <span class="text-amber-400 text-xs font-bold align-super mr-1">${v.verse}</span>${v.text}
          </p>`).join('');
        document.getElementById('playerVerseCount').textContent = verses.length + ' verses';
        localStorage.setItem('cymorAudioLast', JSON.stringify({ bookSlug: state.bookSlug, bookLabel: state.bookLabel, chapter: state.chapter, maxChapter: state.maxChapter }));
      } catch (e) {
        container.innerHTML = '<p class="text-red-400 text-sm text-center py-10">Couldn\'t load this chapter.</p>';
      }
    }

    function speakCurrent() {
      if (!('speechSynthesis' in window)) { alert("Your browser doesn't support text-to-speech."); return; }
      if (currentIdx >= verses.length) { playing = false; updatePlayBtn(); return; }
      document.querySelectorAll('.verse-line').forEach(el => el.classList.remove('reading'));
      const line = document.getElementById('vline-' + currentIdx);
      if (line) { line.classList.add('reading'); line.scrollIntoView({ behavior: 'smooth', block: 'center' }); }

      const utter = new SpeechSynthesisUtterance(verses[currentIdx].text);
      utter.rate = voiceRate;
      if (synthVoice) utter.voice = synthVoice;
      utter.onend = () => { if (playing) { currentIdx++; speakCurrent(); } };
      speechSynthesis.speak(utter);
      document.getElementById('playerStatus').textContent = 'Reading verse ' + (currentIdx + 1);
    }

    function togglePlay() {
      if (!('speechSynthesis' in window)) { alert("Your browser doesn't support text-to-speech."); return; }
      if (playing) {
        playing = false;
        speechSynthesis.cancel();
        document.getElementById('playerStatus').textContent = 'Paused';
      } else {
        playing = true;
        speakCurrent();
      }
      updatePlayBtn();
    }

    function stopReading() {
      playing = false;
      if ('speechSynthesis' in window) speechSynthesis.cancel();
      updatePlayBtn();
      document.getElementById('playerStatus').textContent = 'Ready';
    }

    function updatePlayBtn() {
      document.getElementById('playBtn').textContent = playing ? '⏸' : '▶';
    }

    function skipVerse(dir) {
      speechSynthesis.cancel();
      currentIdx = Math.max(0, Math.min(verses.length - 1, currentIdx + dir));
      if (playing) speakCurrent();
      else {
        document.querySelectorAll('.verse-line').forEach(el => el.classList.remove('reading'));
        const line = document.getElementById('vline-' + currentIdx);
        if (line) { line.classList.add('reading'); line.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
      }
    }

    function updateSpeed(v) {
      voiceRate = parseFloat(v);
      document.getElementById('speedVal').textContent = voiceRate.toFixed(1) + 'x';
    }

    function openBookPicker() {
      const list = document.getElementById('bookList');
      list.innerHTML = CYMOR.BOOKS.map(([slug, label, chapters]) => `
        <button onclick="pickBook('${slug}','${label}',${chapters})" class="text-xs font-medium py-3 rounded-xl border border-slate-700 bg-slate-800/50 active:scale-95 transition">${label}</button>
      `).join('');
      document.getElementById('bookSheet').classList.remove('hidden');
      document.getElementById('bookSheet').classList.add('flex');
    }
    function closeBookPicker() {
      document.getElementById('bookSheet').classList.add('hidden');
      document.getElementById('bookSheet').classList.remove('flex');
    }
    function pickBook(slug, label, chapters) {
      state.bookSlug = slug; state.bookLabel = label; state.maxChapter = chapters;
      closeBookPicker();
      openChapterPicker();
    }
    function openChapterPicker() {
      document.getElementById('chapterSheetTitle').textContent = state.bookLabel;
      const grid = document.getElementById('chapterGrid');
      let html = '';
      for (let i = 1; i <= state.maxChapter; i++) {
        html += `<button onclick="pickChapter(${i})" class="text-xs font-bold py-3 rounded-xl border border-slate-700 bg-slate-800/50 active:scale-95 transition">${i}</button>`;
      }
      grid.innerHTML = html;
      document.getElementById('chapterSheet').classList.remove('hidden');
      document.getElementById('chapterSheet').classList.add('flex');
    }
    function closeChapterPicker() {
      document.getElementById('chapterSheet').classList.add('hidden');
      document.getElementById('chapterSheet').classList.remove('flex');
    }
    function pickChapter(n) {
      state.chapter = n;
      closeChapterPicker();
      loadChapter();
      window.scrollTo(0,0);
    }

    // Pick up where the Bible reader left off, if available
    const lastRead = JSON.parse(localStorage.getItem('cymorLastRead') || 'null');
    if (lastRead) Object.assign(state, lastRead);

    loadChapter();
    CYMOR.startNotificationScheduler();
    CYMOR.renderMiniPlayer();
  </script>
</body>
</html>
