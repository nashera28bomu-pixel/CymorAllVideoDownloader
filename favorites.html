<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saved Verses — Cymor Bible</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-[#0F172A] text-slate-100 min-h-screen">

  <header class="sticky top-0 z-50 bg-[#0F172A]/90 backdrop-blur-md border-b border-slate-800 p-4">
    <div class="max-w-md mx-auto flex items-center justify-between">
      <a href="./index.html" class="text-slate-400">← Home</a>
      <h1 class="font-bold text-sm">Saved Verses</h1>
      <button id="clearAll" class="text-red-400 text-[10px] font-bold uppercase tracking-tighter">Clear All</button>
    </div>
  </header>

  <main id="favoritesList" class="max-w-md mx-auto px-4 py-6 space-y-4">
    </main>

  <script>
    const list = document.getElementById('favoritesList');
    const clearBtn = document.getElementById('clearAll');

    function renderFavorites() {
      const favs = JSON.parse(localStorage.getItem('cymorFavorites') || "[]");
      
      if (favs.length === 0) {
        list.innerHTML = `
          <div class="py-20 text-center opacity-50">
            <p class="text-3xl mb-4">📜</p>
            <p class="text-sm">No bookmarks yet.</p>
          </div>
        `;
        return;
      }

      list.innerHTML = favs.map((v, i) => `
        <div class="p-6 rounded-3xl bg-slate-900/50 border border-slate-800">
          <p class="text-lg leading-relaxed mb-4 italic text-slate-200">"${v.text}"</p>
          <div class="flex justify-between items-center">
             <span class="text-blue-400 font-bold text-xs uppercase tracking-widest">${v.reference}</span>
             <button onclick="removeFav(${i})" class="text-slate-500 hover:text-red-400">Remove</button>
          </div>
        </div>
      `).join('');
    }

    window.removeFav = (index) => {
      let favs = JSON.parse(localStorage.getItem('cymorFavorites') || "[]");
      favs.splice(index, 1);
      localStorage.setItem('cymorFavorites', JSON.stringify(favs));
      renderFavorites();
    };

    clearBtn.onclick = () => {
        if(confirm("Clear all bookmarks?")) {
            localStorage.setItem('cymorFavorites', "[]");
            renderFavorites();
        }
    };

    renderFavorites();
  </script>
</body>
</html>
