<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scripture Reader — Cymor Bible</title>
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="/icon.svg" />
<link rel="stylesheet" href="/styles.css" />
<link rel="stylesheet" href="/css/reader.css" />
</head>
<body class="reader-body">

<header class="reader-top">
  <a href="/index.html" class="back-link">← Home</a>
  <h1>Scripture Reader</h1>
  <button id="search-open-btn" class="icon-btn" aria-label="Search scripture">🔍</button>
</header>

<div class="reader-controls">
  <div class="control-row">
    <select id="translation-select" aria-label="Translation"></select>
    <button id="parallel-toggle-btn" class="chip-btn" aria-pressed="false">+ Parallel</button>
  </div>

  <div class="control-row" id="parallel-row" hidden>
    <select id="parallel-translation-select" aria-label="Parallel translation"></select>
    <button id="parallel-remove-btn" class="chip-btn" aria-label="Remove parallel translation">✕</button>
  </div>

  <div class="control-row">
    <select id="book-select" aria-label="Book"></select>
    <select id="chapter-select" aria-label="Chapter"></select>
  </div>

  <div class="control-row font-row">
    <span class="font-label">Text size</span>
    <div class="font-stepper">
      <button id="font-decrease-btn" aria-label="Decrease text size">A−</button>
      <button id="font-increase-btn" aria-label="Increase text size">A+</button>
    </div>
    <button id="theme-cycle-btn" class="chip-btn" title="Change theme">🌓 Theme</button>
  </div>

  <div class="control-row">
    <button id="save-reading-btn" class="btn-secondary">Save reading</button>
    <button id="share-image-btn" class="btn-primary">Share image</button>
  </div>
</div>

<main id="reader-main" class="reader-main">
  <div class="loading-state" id="loading-state">Loading scripture…</div>
</main>

<!-- Search overlay -->
<div class="overlay" id="search-overlay" hidden>
  <div class="overlay-header">
    <button id="search-close-btn" class="icon-btn" aria-label="Close search">←</button>
    <input type="search" id="search-input" placeholder="Search scripture keyword… (KJV only)" />
  </div>
  <div class="search-note">Search currently covers the King James Version only — see the app's README for why.</div>
  <div id="search-results" class="search-results"></div>
</div>

<!-- Verse action sheet -->
<div class="sheet-backdrop" id="verse-backdrop"></div>
<div class="sheet" id="verse-sheet" role="dialog" aria-modal="true" aria-label="Verse options">
  <div class="sheet__handle"></div>
  <div class="sheet__body">
    <p class="verse-sheet-ref" id="verse-sheet-ref">—</p>
    <p class="verse-sheet-text" id="verse-sheet-text"></p>

    <div class="highlight-row">
      <span class="group-label">Highlight</span>
      <div class="highlight-swatches">
        <button data-color="none" class="swatch swatch-none" aria-label="No highlight"></button>
        <button data-color="yellow" class="swatch swatch-yellow" aria-label="Yellow highlight"></button>
        <button data-color="green" class="swatch swatch-green" aria-label="Green highlight"></button>
        <button data-color="blue" class="swatch swatch-blue" aria-label="Blue highlight"></button>
        <button data-color="pink" class="swatch swatch-pink" aria-label="Pink highlight"></button>
      </div>
    </div>

    <label class="group-label" for="verse-note-input">Note</label>
    <textarea id="verse-note-input" rows="3" placeholder="Add a private note on this verse…"></textarea>

    <div class="sheet-actions">
      <button id="verse-note-save-btn" class="btn-primary">Save note</button>
      <button id="verse-share-btn" class="btn-secondary">Share this verse</button>
    </div>
    <button id="verse-sheet-close-btn" class="btn-text">Close</button>
  </div>
</div>

<canvas id="share-canvas" width="1080" height="1080" hidden></canvas>

<div class="toast" id="toast"></div>

<script src="/js/bible-data.js"></script>
<script src="/js/translations.js"></script>
<script src="/js/search.js"></script>
<script src="/js/reader.js"></script>
</body>
</html>
