<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cymor Bible Pro — Read</title>

  <meta name="theme-color" content="#0F172A"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.05); }
    .verse:hover { background: rgba(59,130,246,0.08); }
    .highlight { background: rgba(250, 204, 21, 0.2); text-decoration: underline; text-underline-offset: 4px; }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
  </style>
</head>

<body class="bg-[#0F172A] text-slate-100 min-h-screen flex flex-col pb-24">

<header class="sticky top-0 z-50 bg-[#0F172A]/95 backdrop-blur border-b border-slate-800 px-4 py-3">
  <div class="max-w-md mx-auto space-y-3">
    <div class="flex items-center justify-between">
      <a href="index.html" class="text-blue-400 text-xs font-bold uppercase tracking-widest">← Back</a>
      <h1 class="text-sm font-bold tracking-tight">Scripture Reader</h1>
      <div class="w-8"></div> </div>

    <div class="relative group">
      <input id="searchInput" 
        type="text" 
        placeholder="Search keyword (e.g. Hope, Love)" 
        class="w-full bg-slate-900 border border-slate-700 text-slate-100 text-sm rounded-xl px-4 py-3 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/50 transition-all"
      />
      <div class="absolute right-4 top-3.5 text-slate-500 pointer-events-none">🔍</div>
    </div>
  </div>
</header>

<main class="max-w-md mx-auto w-full px-4 py-6 space-y-6 flex-1">
  
  <section class="space-y-3">
    <select id="testament-select" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl text-sm outline-none focus:border-blue-500 transition-all appearance-none cursor-pointer">
        <option value="">Select Testament</option>
        <option value="OT">Old Testament</option>
        <option value="NT">New Testament</option>
    </select>
    
    <div class="grid grid-cols-2 gap-3">
      <select id="book-select" disabled class="p-4 bg-slate-900 border border-slate-800 rounded-2xl text-sm outline-none opacity-50 focus:border-blue-500 transition-all cursor-pointer">
        <option>Select Book</option>
      </select>
      <select id="chapter-select" disabled class="p-4 bg-slate-900 border border-slate-800 rounded-2xl text-sm outline-none opacity-50 focus:border-blue-500 transition-all cursor-pointer">
        <option>Select Chapter</option>
      </select>
    </div>

    <button id="pwaInstallBtn" class="hidden w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white p-4 rounded-2xl text-xs font-bold shadow-lg shadow-blue-500/20 active:scale-95 transition-all">
        📥 DOWNLOAD OFFLINE VERSION
    </button>
  </section>

  <div class="flex gap-3">
    <button id="saveHistoryBtn" class="flex-1 bg-slate-800 border border-slate-700 p-4 rounded-2xl text-[10px] font-bold uppercase tracking-wider active:scale-95 transition-all">Save Progress</button>
    <button id="whatsappBtn" class="flex-1 bg-green-600 p-4 rounded-2xl text-[10px] font-bold uppercase tracking-wider active:scale-95 transition-all shadow-lg shadow-green-600/10">WhatsApp Share</button>
  </div>

  <section class="bg-slate-900/40 border border-slate-800 rounded-[32px] p-6 mb-12">
    <h2 id="reference" class="text-blue-400 font-bold text-xs mb-6 uppercase tracking-[0.2em]">Select a Chapter</h2>
    <div id="bible-display" class="space-y-5 text-[16px] leading-relaxed text-slate-200">
        <div class="flex flex-col items-center justify-center py-12 text-slate-500 space-y-2">
            <div class="w-8 h-8 border-2 border-blue-500/20 border-t-blue-500 rounded-full animate-spin"></div>
            <p class="text-xs font-medium">Synchronizing Scriptures...</p>
        </div>
    </div>
  </section>
</main>

<nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-800 px-8 py-4 flex justify-between items-center z-[100]">
    <a href="index.html" class="flex flex-col items-center gap-1 text-slate-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
        <span class="text-[10px]">Home</span>
    </a>
    <a href="bible.html" class="flex flex-col items-center gap-1 nav-active">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg>
        <span class="text-[10px]">Bible</span>
    </a>
    <a href="prayer.html" class="flex flex-col items-center gap-1 text-slate-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"/></svg>
        <span class="text-[10px]">Prayers</span>
    </a>
    <a href="favorites.html" class="flex flex-col items-center gap-1 text-slate-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"/></svg>
        <span class="text-[10px]">Saved</span>
    </a>
</nav>

<script type="module" src="./app.js"></script>

</body>
</html>
